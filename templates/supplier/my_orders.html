{% extends 'base.html' %}

{% block content %}
<div class="mb-8">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8">
        <div>
            <h2 class="text-4xl font-black tracking-tight mb-2 uppercase">Dispatch_History</h2>
            <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="archive" class="w-3 h-3 text-teal-500"></i> Archive: Synchronized</span>
                <span class="flex items-center gap-1"><i data-lucide="activity" class="w-3 h-3 text-violet-500"></i> Stream: Live</span>
            </div>
        </div>
        
        <a href="/supplier/new_order" class="text-teal-400 hover:text-teal-300 font-black text-xs uppercase tracking-widest transition-all flex items-center gap-2 group border border-teal-500/20 px-4 py-2 rounded-xl hover:bg-teal-500/10">
            <i data-lucide="plus" class="w-4 h-4 group-hover:rotate-90 transition-transform"></i> New_Dispatch
        </a>
    </div>

    <div class="GlassPanel p-1 overflow-hidden hidden" id="supOrdersWrap">
        <table class="w-full text-left text-sm whitespace-nowrap">
            <thead class="bg-white/[0.02] text-slate-500 text-[10px] font-black uppercase tracking-widest sticky top-0 backdrop-blur-md z-10">
                <tr>
                    <th class="px-8 py-5">Sensory_ID</th>
                    <th class="px-8 py-5">Target_Node</th>
                    <th class="px-8 py-5">Flow_Status</th>
                    <th class="px-8 py-5">Completion_Vector</th>
                    <th class="px-8 py-5 text-right">Ops_Control</th>
                </tr>
            </thead>
            <tbody id="supOrdersTbody" class="divide-y divide-white/5"></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    fetch('/api/orders').then(r=>r.json()).then(data => {
        document.getElementById('supOrdersWrap').classList.remove('hidden');
        const tbody = document.getElementById('supOrdersTbody');
        data.forEach(o => {
            const tr = document.createElement('tr');
            tr.className = 'group hover:bg-white/[0.02] transition-colors';
            tr.innerHTML = `
                <td class="px-8 py-5 font-mono font-black text-teal-400 group-hover:text-teal-300 transition-colors uppercase tracking-tight">${o.id.substring(0,16)}</td>
                <td class="px-8 py-5 text-slate-300 font-bold uppercase text-xs">${o.dest_city}</td>
                <td class="px-8 py-5">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full ${getStatusColor(o.status)}"></span>
                        <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">${o.status.replace('_', ' ')}</span>
                    </div>
                </td>
                <td class="px-8 py-5">
                    <div class="flex items-center gap-3">
                        <div class="w-24 bg-white/5 rounded-full h-1 overflow-hidden">
                            <div class="bg-gradient-to-r from-teal-500 to-violet-500 h-full rounded-full" style="width: ${o.progress_percent || 0}%"></div>
                        </div>
                        <span class="text-[9px] font-black font-mono text-slate-500">${Math.round(o.progress_percent || 0)}%</span>
                    </div>
                </td>
                <td class="px-8 py-5 text-right">
                    <a href="/customer/track?id=${o.id}" class="inline-flex items-center gap-2 px-4 py-1.5 GlassPanel border-white/5 rounded-xl hover:bg-white/10 transition-all text-[9px] font-black uppercase tracking-widest text-slate-400 group">
                        Live_Feed <i data-lucide="external-link" class="w-3 h-3 group-hover:text-teal-500"></i>
                    </a>
                </td>
            `;
            tbody.appendChild(tr);
        });
        staggerEntranceAnimation('tbody tr', 20);
        lucide.createIcons();
    });

    function getStatusColor(status) {
        if(status === 'in_transit') return 'bg-teal-500';
        if(status === 'delayed') return 'bg-rose-500';
        if(status === 'pending') return 'bg-amber-500';
        return 'bg-emerald-500';
    }
</script>
{% endblock %}
