{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="text-center w-full max-w-5xl">
        <!-- Hero Section -->
        <div class="mb-20 stagger-item">
            <h1 class="text-7xl font-black tracking-tighter uppercase mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/40">
                Tracksy_Global
            </h1>
            <p class="text-slate-500 font-black text-xs uppercase tracking-[0.4em] mb-12 flex items-center justify-center gap-4">
                <span class="w-12 h-px bg-white/10"></span>
                Neural Logistics Command AI
                <span class="w-12 h-px bg-white/10"></span>
            </p>
            
            <div class="flex items-center justify-center gap-4 mb-16">
                <div class="GlassPanel px-4 py-2 flex items-center gap-2 border-white/5">
                    <span class="live-dot w-2 h-2"></span>
                    <span class="text-[9px] font-black uppercase text-white/50 tracking-widest">System_Online</span>
                </div>
                <div class="GlassPanel px-4 py-2 flex items-center gap-2 border-white/5">
                    <i data-lucide="shield-check" class="w-3 h-3 text-teal-500"></i>
                    <span class="text-[9px] font-black uppercase text-white/50 tracking-widest">Quantum_Encrypted</span>
                </div>
            </div>
        </div>

        <!-- Portal Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <a href="/admin/dashboard" class="GlassPanel p-10 group hover:glow-teal transition-all stagger-item border-white/5">
                <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mx-auto mb-6 group-hover:bg-teal-500/10 transition-colors">
                    <i data-lucide="layout-dashboard" class="w-6 h-6 text-teal-500 group-hover:scale-110 transition-transform"></i>
                </div>
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">Admin_HQ</h3>
            </a>

            <a href="/customer/track" class="GlassPanel p-10 group hover:glow-violet transition-all stagger-item border-white/5">
                <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mx-auto mb-6 group-hover:bg-violet-500/10 transition-colors">
                    <i data-lucide="search" class="w-6 h-6 text-violet-500 group-hover:scale-110 transition-transform"></i>
                </div>
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">Track_Order</h3>
            </a>

            <a href="/supplier/dashboard" class="GlassPanel p-10 group hover:glow-teal transition-all stagger-item border-white/5">
                <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mx-auto mb-6 group-hover:bg-teal-500/10 transition-colors">
                    <i data-lucide="building-2" class="w-6 h-6 text-teal-500 group-hover:scale-110 transition-transform"></i>
                </div>
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">Supplier_HQ</h3>
            </a>

            <a href="/driver/active_delivery" class="GlassPanel p-10 group hover:glow-violet transition-all stagger-item border-white/5">
                <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mx-auto mb-6 group-hover:bg-violet-500/10 transition-colors">
                    <i data-lucide="truck" class="w-6 h-6 text-violet-500 group-hover:scale-110 transition-transform"></i>
                </div>
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">Driver_Mission</h3>
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    lucide.createIcons();
    staggerEntranceAnimation('.stagger-item', 100);
</script>
{% endblock %}
