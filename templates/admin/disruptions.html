{% extends 'base.html' %}

{% block content %}
<div class="mb-8">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8">
        <div>
            <h2 class="text-4xl font-black tracking-tight mb-2 uppercase">Risk & Disruption Control</h2>
            <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="shield-alert" class="w-3 h-3 text-amber-500 animate-pulse"></i> Risk Monitoring: Active</span>
                <span class="flex items-center gap-1"><i data-lucide="activity" class="w-3 h-3 text-teal-500"></i> Network Stability: 94%</span>
            </div>
        </div>
        
        <button class="GlassPanel px-5 py-2.5 bg-amber-500 text-navy-950 font-black text-xs uppercase tracking-widest hover:glow-teal transition-all flex items-center gap-2" onclick="simulateGeneralDisruption()">
            <i data-lucide="zap" class="w-4 h-4"></i> Simulate Pulse Event
        </button>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Live Alert Feed -->
        <div class="w-full lg:w-96 flex flex-col gap-4 overflow-y-auto max-h-[700px] pr-2" id="disruptionFeed">
            <div class="GlassPanel p-12 text-center text-slate-600 font-black uppercase text-xs tracking-[0.2em] animate-pulse" id="noDisruptMsg">
                Syncing Global Risk Data...
            </div>
        </div>

        <!-- Global Disruption Map -->
        <div class="flex-1 GlassPanel p-1 relative overflow-hidden h-[700px] border-white/10 group bg-navy-900">
            <div id="disruption-map" class="w-full h-full rounded-[1.4rem] z-10"></div>
            
            <!-- Map Overlay Legend -->
            <div class="absolute bottom-10 left-10 z-[1000] GlassPanel p-6 border-white/10 backdrop-blur-xl">
                <div class="font-black text-[10px] mb-4 uppercase tracking-[0.2em] text-slate-500 flex items-center gap-2">
                    <i data-lucide="info" class="w-3 h-3"></i> SEVERITY_INDEX
                </div>
                <div class="space-y-3">
                    <div class="flex items-center gap-3">
                        <span class="w-2.5 h-2.5 rounded-full bg-rose-500 pulse-teal" style="background-color: #EF4444"></span>
                        <span class="text-xs font-bold text-slate-200 uppercase tracking-wider">CRITICAL_LEVEL</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                        <span class="text-xs font-bold text-slate-200 uppercase tracking-wider">HIGH_RISK_ALPHA</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-2.5 h-2.5 rounded-full bg-sky-500"></span>
                        <span class="text-xs font-bold text-slate-200 uppercase tracking-wider">ADVISORY_SENSOR</span>
                    </div>
                </div>
            </div>

            <!-- Header Labels -->
            <div class="absolute top-6 left-16 z-[1000] flex gap-2">
                <div class="GlassPanel px-3 py-1.5 rounded-full flex items-center space-x-2 border-white/10">
                    <span class="live-dot w-2 h-2"></span>
                    <span class="text-[10px] font-black uppercase text-white/70 tracking-widest">Global Risk Matrix</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const map = L.map('disruption-map', { zoomControl: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    let activeCircles = [];
    lucide.createIcons();

    function renderDisruptions(list) {
        const feed = document.getElementById('disruptionFeed');
        document.getElementById('noDisruptMsg')?.remove();
        
        activeCircles.forEach(c => map.removeLayer(c));
        activeCircles = [];
        feed.innerHTML = '';

        if(list.length === 0) {
            feed.innerHTML = `
                <div class="GlassPanel p-8 border-teal-500/20 glow-teal border">
                    <div class="flex flex-col items-center text-center">
                        <div class="w-12 h-12 rounded-full bg-teal-500/10 flex items-center justify-center mb-4 text-teal-500">
                            <i data-lucide="shield-check" class="w-6 h-6"></i>
                        </div>
                        <h3 class="font-black text-xs uppercase tracking-widest text-teal-500">Network Stable</h3>
                        <p class="text-[10px] text-slate-500 mt-2 font-bold uppercase tracking-tighter">Zero active anomalies detected in current cycle</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        list.forEach((d, idx) => {
            const color = d.severity === 'critical' ? 'rose' : d.severity === 'high' ? 'amber' : 'sky';
            const hex = d.severity === 'critical' ? '#EF4444' : d.severity === 'high' ? '#F59E0B' : '#0EA5E9';
            
            // Map Circle
            let circle = L.circle([d.affected_lat, d.affected_lng], {
                color: hex,
                fillColor: hex,
                fillOpacity: 0.15,
                radius: d.affected_radius_km * 1000,
                weight: 2
            }).bindPopup(`<b>${d.title}</b><br>${d.description}`).addTo(map);
            activeCircles.push(circle);

            // Feed Card
            feed.innerHTML += `
                <div class="GlassPanel p-6 border-l-4 group transition-all hover:bg-white/[0.02]" style="border-left-color: ${hex}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-[10px] uppercase font-black tracking-[0.2em] text-slate-500 flex items-center gap-2">
                            <i data-lucide="${getTypeIcon(d.type)}" class="w-3 h-3" style="color: ${hex}"></i> ${d.type.replace('_',' ')}
                        </div>
                        <span class="text-[9px] font-black px-2 py-0.5 rounded-full uppercase border tracking-tighter" style="color: ${hex}; border-color: ${hex}33; background-color: ${hex}10">${d.severity}</span>
                    </div>
                    <h3 class="font-black text-lg mb-2 tracking-tight transition-colors group-hover:text-white">${d.title.toUpperCase()}</h3>
                    <p class="text-[11px] text-slate-400 mb-6 leading-relaxed font-bold uppercase tracking-tighter italic opacity-70">"${d.description}"</p>
                    <button class="w-full py-2.5 GlassPanel border-white/10 hover:bg-white/10 group-hover:border-white/20 rounded-xl transition-all text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2" onclick="alert('Reroute Sequence Initiated')">
                        INITIATE_MITIGATION <i data-lucide="arrow-right" class="w-3 h-3"></i>
                    </button>
                </div>
            `;
        });
        
        staggerEntranceAnimation('#disruptionFeed > div', 80);
        lucide.createIcons();
    }

    function getTypeIcon(type) {
        if(type.includes('weather')) return 'cloud-rain';
        if(type.includes('congestion')) return 'anchor';
        if(type.includes('strike')) return 'users';
        return 'alert-circle';
    }

    fetch('/api/disruptions').then(r=>r.json()).then(data => renderDisruptions(data));

    function simulateGeneralDisruption() {
        const types = ['port_congestion', 'weather', 'strike'];
        fetch('/api/simulate_disruption', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({type: types[Math.floor(Math.random() * types.length)]})
        }).then(r=>location.reload());
    }

    socket.on('disruption_alert', (data) => {
        fetch('/api/disruptions').then(r=>r.json()).then(d => renderDisruptions(d));
    });

</script>
{% endblock %}
