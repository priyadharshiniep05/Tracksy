{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto mb-8">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8">
        <div>
            <h2 class="text-4xl font-black tracking-tight mb-2 uppercase">Neural Route Optimizer</h2>
            <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3 text-teal-500"></i> Solver: Multi-Agent RL</span>
                <span class="flex items-center gap-1"><i data-lucide="globe" class="w-3 h-3 text-violet-500"></i> Region: Global Matrix</span>
            </div>
        </div>
        
        <div class="flex gap-2 mt-4 md:mt-0">
            <span class="px-3 py-1 bg-violet-500/10 text-violet-500 rounded-full border border-violet-500/20 text-[10px] font-bold uppercase tracking-wider">Engine: Live</span>
        </div>
    </div>
    
    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Input Parameters Panel -->
        <div class="w-full lg:w-80 GlassPanel p-8 h-fit z-20 border-white/10 glow-violet">
            <h3 class="font-black text-xs uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                <i data-lucide="settings-2" class="w-4 h-4 text-violet-500"></i> SOLVER_PARAMS
            </h3>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Origin_Vector</label>
                    <div class="relative">
                        <i data-lucide="map-pin" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-teal-500/50"></i>
                        <input type="text" id="origLatLng" value="19.0760,72.8777" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-3 py-2 text-xs font-mono font-bold focus:outline-none focus:border-teal-500 transition-all">
                    </div>
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Destination_Target</label>
                    <div class="relative">
                        <i data-lucide="navigation" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-violet-500/50"></i>
                        <input type="text" id="destLatLng" value="51.5074,-0.1278" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-3 py-2 text-xs font-mono font-bold focus:outline-none focus:border-violet-500 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Mass_KG</label>
                        <input type="number" id="weight" value="5000" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs font-mono font-bold focus:outline-none focus:border-white/20">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Priority</label>
                        <select id="priority" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs font-black uppercase focus:outline-none cursor-pointer">
                            <option value="standard">STANDARD</option>
                            <option value="urgent">URGENT</option>
                            <option value="economy">ECONOMY</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <button onclick="runOptimization()" id="optBtn" class="w-full mt-8 bg-gradient-to-r from-teal-500 to-violet-500 hover:glow-teal text-navy-950 font-black text-xs uppercase tracking-widest py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="zap" class="w-4 h-4"></i> EXECUTE_SOLVER
            </button>
        </div>

        <!-- Output Visualization -->
        <div class="flex-1 flex flex-col gap-6">
            <div class="GlassPanel p-1 relative overflow-hidden bg-navy-900 border-white/10 group">
                <div id="opt-map" class="map-nav relative z-10"></div>
                <!-- Interactive Overlay -->
                <div class="absolute bottom-4 left-4 z-[1000] flex gap-2">
                    <div class="GlassPanel px-3 py-1.5 rounded-full flex items-center space-x-2 border-white/10">
                        <span class="live-dot w-2 h-2"></span>
                        <span class="text-[10px] font-black uppercase text-white/70">Neural Path Synthesis...</span>
                    </div>
                </div>
            </div>
            
            <div id="opt-results" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Data populated dynamically -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const map = L.map('opt-map', { zoomControl: false }).setView([30, 30], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    
    let currentPolys = [];
    lucide.createIcons();

    function runOptimization() {
        const btn = document.getElementById('optBtn');
        const btnHtml = btn.innerHTML;
        btn.innerHTML = '<span class="live-dot mr-2"></span> SOLVING...';
        btn.disabled = true;
        
        const orig = document.getElementById('origLatLng').value.split(',').map(n=>parseFloat(n.trim()));
        const dest = document.getElementById('destLatLng').value.split(',').map(n=>parseFloat(n.trim()));
        
        fetch('/api/optimize_route', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                origin_lat: orig[0], origin_lng: orig[1],
                dest_lat: dest[0], dest_lng: dest[1],
                weight_kg: parseFloat(document.getElementById('weight').value),
                priority: document.getElementById('priority').value,
                vehicle_type: 'truck'
            })
        }).then(r=>r.json()).then(data => {
            btn.innerHTML = btnHtml;
            btn.disabled = false;
            
            currentPolys.forEach(p => map.removeLayer(p));
            currentPolys = [];
            
            const resultsBox = document.getElementById('opt-results');
            resultsBox.classList.remove('hidden');
            resultsBox.innerHTML = '';
            
            data.options.forEach((opt, idx) => {
                const color = idx===0?'#00D4C8':idx===1?'#635BFF':'#94A3B8';
                
                // Draw path with shadow
                let poly = L.polyline(data.waypoints, {
                    color: color, 
                    weight: 3, opacity: 0.8,
                    dashArray: idx > 0 ? '5, 10' : null
                }).addTo(map);
                currentPolys.push(poly);
                
                // Add card
                resultsBox.innerHTML += `
                <div class="GlassPanel p-6 relative group transform transition-all hover:-translate-y-1 ${idx===0 ? 'border-teal-500/30 glow-teal' : 'border-white/10 hover:border-white/20'}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${getIcon(opt.mode)}" class="w-4 h-4 ${idx===0 ? 'text-teal-500' : 'text-slate-500'}"></i>
                            <h4 class="font-black uppercase tracking-widest text-[10px] text-slate-400">${opt.mode}</h4>
                        </div>
                        ${idx===0 ? '<span class="text-[10px] bg-teal-500 text-navy-950 px-3 py-0.5 font-black uppercase rounded-full tracking-tighter">AI_OPTIMAL</span>' : ''}
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <div class="text-[9px] font-black text-slate-500 uppercase">Duration</div>
                            <div class="text-xl font-black text-slate-100">${opt.total_hours.toFixed(0)}<span class="text-xs ml-1">HRS</span></div>
                        </div>
                        <div>
                            <div class="text-[9px] font-black text-slate-500 uppercase">Est_Cost</div>
                            <div class="text-xl font-black text-teal-500">$${opt.total_cost_usd.toFixed(0)}</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="leaf" class="w-3 h-3 text-emerald-500"></i>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${opt.total_carbon_kg.toFixed(0)}KG CO2_EMISSIONS</span>
                    </div>

                    <p class="text-[11px] text-slate-400 leading-relaxed mb-6 italic min-h-[50px]">"${opt.ai_explanation}"</p>
                    
                    <button class="w-full py-2.5 GlassPanel border-white/10 hover:bg-white/10 rounded-xl transition-all text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
                        INITIALIZE_FLOW <i data-lucide="arrow-right" class="w-3 h-3"></i>
                    </button>
                </div>
                `;
            });
            map.fitBounds(currentPolys[0].getBounds(), {padding: [50, 50]});
            lucide.createIcons();
            staggerEntranceAnimation('#opt-results > div', 100);
        });
    }

    function getIcon(mode) {
        if(mode === 'road' || mode === 'truck') return 'truck';
        if(mode === 'air' || mode === 'flight') return 'plane';
        if(mode === 'sea' || mode === 'ship') return 'ship';
        return 'train';
    }
</script>
{% endblock %}
