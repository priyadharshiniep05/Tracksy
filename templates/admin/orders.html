{% extends 'base.html' %}

{% block content %}
<div class="mb-8 h-full flex flex-col">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8">
        <div>
            <h2 class="text-4xl font-black tracking-tight mb-2 uppercase">Orders Command</h2>
            <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="package" class="w-3 h-3 text-teal-500"></i> Active Dispatches: Online</span>
                <span class="flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3 text-violet-500"></i> Ledger Sync: Online</span>
            </div>
        </div>
        
        <button class="GlassPanel px-5 py-2.5 hover:bg-white/5 font-black text-xs uppercase tracking-widest transition-all flex items-center gap-2 text-slate-400" onclick="alert('Export Triggered')">
            <i data-lucide="share" class="w-4 h-4"></i> Export Ledger
        </button>
    </div>

    <!-- Main Table View -->
    <div class="GlassPanel flex-1 overflow-hidden flex flex-col min-h-[600px]">
        <div class="px-8 py-6 border-b border-white/5 flex flex-col md:flex-row gap-6 items-center">
            <div class="relative flex-1 max-w-md w-full">
                <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" placeholder="QUERY_SYSTEM_ID..." class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-2.5 text-xs font-black uppercase tracking-widest focus:outline-none focus:border-teal-500/50 transition-all placeholder:text-slate-600">
            </div>
            
            <div class="flex gap-4 w-full md:w-auto">
                <div class="relative flex-1 md:w-48">
                    <i data-lucide="filter" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <select class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-2.5 text-xs font-black uppercase tracking-widest focus:outline-none appearance-none cursor-pointer hover:bg-white/10 transition-all">
                        <option value="">STATUS: ALL</option>
                        <option value="in_transit">IN_TRANSIT</option>
                        <option value="pending">PENDING</option>
                        <option value="delayed">DELAYED</option>
                    </select>
                </div>
                <button class="p-2.5 GlassPanel rounded-2xl hover:bg-white/10 transition-all text-slate-400">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-white/[0.02] text-slate-500 text-[10px] font-black uppercase tracking-widest sticky top-0 backdrop-blur-md z-10">
                    <tr>
                        <th class="px-8 py-5">Sensory_ID</th>
                        <th class="px-8 py-5">Chain_Ver</th>
                        <th class="px-8 py-5">Origin_Dest_Vector</th>
                        <th class="px-8 py-5">Mode_Type</th>
                        <th class="px-8 py-5">Priority_Lvl</th>
                        <th class="px-8 py-5">Neural_Status</th>
                        <th class="px-8 py-5">Flow_Progress</th>
                        <th class="px-8 py-5 text-right">Ops_Control</th>
                    </tr>
                </thead>
                <tbody id="ordersTbody" class="divide-y divide-white/5">
                    <tr><td colspan="8" class="p-12 text-center text-slate-600 font-black uppercase text-xs tracking-[0.2em] animate-pulse">Initializing System Stream...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    fetch('/api/orders').then(r=>r.json()).then(data => {
        const tbody = document.getElementById('ordersTbody');
        tbody.innerHTML = '';
        data.forEach(o => {
            const tr = document.createElement('tr');
            tr.className = 'group hover:bg-white/[0.02] transition-all';
            tr.innerHTML = `
                <td class="px-8 py-5">
                    <a href="/customer/track?id=${o.id}" class="font-mono font-black text-teal-400 group-hover:text-teal-300 transition-colors uppercase tracking-tight">${o.id}</a>
                </td>
                <td class="px-8 py-5 text-center">
                    <div class="text-emerald-500 drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                </td>
                <td class="px-8 py-5">
                    <div class="flex items-center gap-3">
                        <span class="text-slate-100 font-bold">${o.origin_city}</span>
                        <i data-lucide="arrow-right" class="w-3 h-3 text-slate-600"></i>
                        <span class="text-slate-100 font-bold">${o.dest_city}</span>
                    </div>
                </td>
                <td class="px-8 py-5">
                    <span class="text-[10px] font-black uppercase px-2 py-1 rounded-md bg-white/5 border border-white/10 text-slate-400 flex items-center gap-2 w-fit">
                        <i data-lucide="${getIcon(o.transport_mode)}" class="w-3 h-3"></i> ${o.transport_mode}
                    </span>
                </td>
                <td class="px-8 py-5">
                    <span class="text-[10px] font-black uppercase text-slate-500 tracking-tighter">${o.priority}</span>
                </td>
                <td class="px-8 py-5">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full ${getStatusColor(o.status)} ${o.status !== 'pending' ? 'animate-pulse' : ''}"></span>
                        <span class="text-[10px] font-black uppercase text-slate-300 tracking-wider">${o.status.replace('_', ' ')}</span>
                    </div>
                </td>
                <td class="px-8 py-5">
                    <div class="flex items-center gap-3">
                        <div class="w-24 bg-white/5 rounded-full h-1 overflow-hidden">
                            <div class="bg-gradient-to-r from-teal-500 to-violet-500 h-full rounded-full" style="width: ${o.progress_percent}%"></div>
                        </div>
                        <span class="text-[10px] font-black font-mono text-slate-500">${Math.round(o.progress_percent)}%</span>
                    </div>
                </td>
                <td class="px-8 py-5 text-right">
                    <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="p-2 GlassPanel rounded-xl hover:bg-white/10 hover:text-white text-slate-500 transition-all" onclick="alert('Analysis Open')">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                        </button>
                        ${o.status === 'in_transit' ? `
                        <button class="p-2 GlassPanel rounded-xl hover:bg-amber-500/20 hover:text-amber-500 text-amber-500/50 transition-all border-amber-500/20" onclick="forceReroute('${o.id}')">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>` : ''}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
        staggerEntranceAnimation('tbody tr', 15);
        lucide.createIcons();
    });

    function getIcon(mode) {
        if(mode === 'road' || mode === 'truck') return 'truck';
        if(mode === 'air') return 'plane';
        if(mode === 'sea') return 'ship';
        return 'train';
    }

    function getStatusColor(status) {
        if(status === 'in_transit') return 'bg-teal-500';
        if(status === 'delayed') return 'bg-rose-500';
        if(status === 'pending') return 'bg-amber-500';
        return 'bg-emerald-500';
    }

    function forceReroute(id) {
        if(confirm(`INITIATE EMERGENCY AI REROUTE: ${id}?`)) {
            fetch('/api/orders/delay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: id, severity: 'emergency'})
            }).then(r=>r.json()).then(data=>alert('RE-OPTIMIZATION COMMAND BROADCASTED.'));
        }
    }
</script>
{% endblock %}
