{% extends 'base.html' %}

{% block content %}
<div class="relative w-full h-[85vh] overflow-hidden rounded-3xl stagger-item">
    <!-- Map -->
    <div id="driver-map" class="w-full h-full bg-navy-900 z-10"></div>

    <!-- Top Overlay Global Status -->
    <div class="absolute top-6 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-md px-6">
        <div class="GlassPanel px-6 py-3 flex items-center justify-between border-white/10 backdrop-blur-2xl">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-100">Live_Tracking_Sync</span>
            </div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest" id="order-id">TRK-2025-ABCD</div>
        </div>
    </div>

    <!-- Floating Mission Sheet -->
    <div id="driver-sheet" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-2xl px-6 transition-all duration-500 translate-y-0">
        <div class="GlassPanel p-8 border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] glow-violet">
            <!-- Pull Handle -->
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-8 cursor-pointer hover:bg-white/20 transition-colors" onclick="toggleSheet()"></div>
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                <div>
                    <h2 class="text-3xl font-black tracking-tighter uppercase text-slate-100 mb-1">Mission_Status</h2>
                    <div class="flex items-center gap-2 text-teal-500 text-[10px] font-black uppercase tracking-widest">
                        <i data-lucide="map" class="w-3 h-3"></i> En-route to Destination
                    </div>
                </div>
                <div class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-right">
                    <div class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1">Projected_ETA</div>
                    <div class="text-2xl font-black font-mono text-teal-400" id="eta-display">14:30</div>
                </div>
            </div>

            <!-- Action Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button class="group flex items-center justify-center gap-3 bg-teal-500 text-navy-950 px-6 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:glow-teal transition-all" onclick="updatePos()">
                    <i data-lucide="navigation" class="w-4 h-4 group-hover:rotate-45 transition-transform"></i> Transmit_Coord
                </button>
                <button class="group flex items-center justify-center gap-3 bg-white/5 border border-rose-500/20 text-rose-500 px-6 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-rose-500/10 transition-all" onclick="reportDelay()">
                    <i data-lucide="alert-octagon" class="w-4 h-4 group-hover:scale-125 transition-transform"></i> Report_Disruption
                </button>
            </div>

            <!-- Collab Insights -->
            <div class="bg-violet-500/10 border border-violet-500/20 rounded-2xl p-6 relative overflow-hidden">
                <div class="flex justify-between items-center relative z-10">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-violet-500/20 rounded-xl text-violet-500">
                            <i data-lucide="users" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="text-xs font-black text-slate-200 uppercase tracking-tight">Spare_Capacity_Detected</div>
                            <div class="text-[10px] text-slate-500 font-black uppercase tracking-widest">30% Residual Volume Available</div>
                        </div>
                    </div>
                    <button class="bg-violet-500 text-white px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl hover:shadow-lg hover:shadow-violet-500/20 transition-all">
                        List_Space
                    </button>
                </div>
                <div class="absolute -right-2 -bottom-2 opacity-5">
                    <i data-lucide="box" class="w-16 h-16 text-violet-500"></i>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const map = L.map('driver-map', { zoomControl: false }).setView([51.5, -0.1], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    let currentMarker;
    let orderId = "{{ order.id if order else 'TRK-2025-OPERATIVE-ALPHA' }}";

    lucide.createIcons();

    // Init data
    document.getElementById('order-id').innerText = orderId;
    document.getElementById('eta-display').innerText = "{{ order.eta if order else '14:30' }}";
    
    currentMarker = L.marker([51.5, -0.1], {
        icon: L.divIcon({
            className: 'custom-div-icon',
            html: `<div><i data-lucide="truck" class="text-teal-500 w-8 h-8 drop-shadow-[0_0_10px_rgba(0,212,200,0.8)]"></i></div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        })
    }).addTo(map);
    lucide.createIcons();

    function toggleSheet() {
        const sheet = document.getElementById('driver-sheet');
        sheet.classList.toggle('translate-y-[200px]');
    }

    function updatePos() {
        const center = map.getCenter();
        const randLat = center.lat + (Math.random() - 0.5) * 0.005;
        const randLng = center.lng + (Math.random() - 0.5) * 0.005;
        
        if(typeof socket !== 'undefined') {
            socket.emit('driver_location_update', {order_id: orderId, lat: randLat, lng: randLng});
            const btn = event.currentTarget;
            if(btn) {
                const oldHtml = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> TRANSMITTED';
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = oldHtml; lucide.createIcons(); }, 2000);
            }
        }
    }

    function reportDelay() {
        if(confirm("INITIATE EMERGENCY REROUTE PROTOCOL?")) {
            fetch('/api/orders/delay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: orderId, severity: 'emergency'})
            }).then(r=>r.json()).then(data=>{
                alert("PROTOCOL_ENGAGED: System initiating path re-optimization.");
            })
        }
    }

    window.addEventListener('trackingUpdate', (e) => {
        const data = e.detail;
        if(currentMarker && data.order_id === orderId) {
            currentMarker.setLatLng([data.lat, data.lng]);
            map.panTo([data.lat, data.lng]);
        }
    });

    setInterval(() => {
        updatePos();
    }, 30000);
</script>
{% endblock %}
