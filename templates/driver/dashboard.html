{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] max-w-lg mx-auto stagger-item">
    <div class="GlassPanel p-12 w-full text-center border-white/10 glow-violet relative overflow-hidden">
        <div class="absolute -right-16 -top-16 opacity-5 rotate-12">
            <i data-lucide="truck" class="w-64 h-64 text-violet-400"></i>
        </div>

        <div class="relative z-10">
            <div class="w-24 h-24 bg-white/5 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl border-2 border-teal-500/30 group p-1 transition-all hover:border-teal-500">
                <div class="w-full h-full rounded-full bg-teal-500/10 flex items-center justify-center text-teal-500">
                    <i data-lucide="user" class="w-10 h-10"></i>
                </div>
            </div>
            
            <h2 class="text-3xl font-black mb-1 uppercase tracking-tighter">Unit_Operator_Hub</h2>
            <div class="flex justify-center items-center gap-2 text-emerald-500 text-[10px] font-black uppercase tracking-widest mb-10">
                <span class="live-dot w-2 h-2"></span> System_Status: Fully_Functional
            </div>
            
            <div class="space-y-4">
                <a href="/driver/active_delivery" class="group block w-full bg-gradient-to-r from-teal-500 to-violet-500 text-navy-950 px-6 py-5 rounded-2xl font-black uppercase tracking-widest text-xs hover:glow-teal transition-all flex items-center justify-center gap-3">
                    <i data-lucide="navigation" class="w-4 h-4 group-hover:animate-bounce"></i> Enter_Mission_Control
                </a>
                
                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 p-4 GlassPanel rounded-2xl border-white/5 hover:bg-white/5 transition-all text-xs font-black uppercase tracking-widest text-slate-400">
                        <i data-lucide="calendar" class="w-4 h-4"></i> Roster
                    </button>
                    <button class="flex items-center justify-center gap-2 p-4 GlassPanel rounded-2xl border-white/5 hover:bg-white/5 transition-all text-xs font-black uppercase tracking-widest text-slate-400">
                        <i data-lucide="wrench" class="w-4 h-4"></i> Service
                    </button>
                </div>

                <div class="pt-8 border-t border-white/5 mt-8">
                    <div class="flex items-center justify-between px-2">
                        <div class="text-left">
                            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Active_Node</div>
                            <div class="text-xs font-black text-slate-300">TRK-2025-VOLVO</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Shift_Time</div>
                            <div class="text-xs font-black text-slate-300">04:22:15</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    lucide.createIcons();
    staggerEntranceAnimation('.GlassPanel', 100);
</script>
{% endblock %}
